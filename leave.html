<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在久別之後 | Writing | Sora Kai 的小宇宙</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            line-height: 2.2;
            color: #444;
            background-color: #fafafa;
            margin: 0;
            padding: 0;
        }
        nav {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        nav a {
            text-decoration: none;
            color: #999;
            font-size: 0.9em;
        }
        nav a:hover {
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 80px auto;
            padding: 0 30px;
        }
        header {
            text-align: center;
            margin-bottom: 70px;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 6px;
            color: #222;
        }
        .poem-content {
            font-size: 1.15em;
            letter-spacing: 2px;
            text-align: center;
        }
        .stanza {
            margin-bottom: 45px;
        }
        /* 呈現「寂寞秘密」的低語感 */
        .whisper {
            color: #777;
            font-size: 0.95em;
        }
        /* 呈現「雲淡風輕」的淡出感 */
        .fade-out {
            margin-top: 60px;
            color: #bbb;
            transition: color 1s;
        }
        footer {
            text-align: center;
            margin-top: 100px;
            padding-bottom: 40px;
            font-size: 0.8em;
            color: #ccc;
        }
    </style>
</head>
<body>

    <nav>
        <a href="Writing.html">← 返回文字創作清單</a>
    </nav>

    <div class="container">
        <article>
            <header>
                <h1>在久別之後</h1>
            </header>
            
            <div class="poem-content">
                <div class="stanza">
                    你來了 陪我<br>
                    在生命的邊緣漫舞
                </div>

                <div class="stanza whisper">
                    無數個夜晚的話語<br>
                    是令人寂寞的秘密
                </div>

                <div class="stanza">
                    期盼 成了緩慢的絕望<br>
                    思念 剩下深沉的耽溺
                </div>

                <div class="stanza">
                    就不要再追究了吧<br>
                    我們之中<br>
                    是誰 先<br>
                    屈服於現實
                </div>

                <div class="stanza">
                    在我們厭倦之前<br>
                    在雲淡風輕之前<br>
                    我先原諒你
                </div>

                <div class="stanza fade-out">
                    逃離<br>
                    其實 我也就要忘了你
                </div>
            </div>
        </article>
    </div>

    <footer>
        <p>&copy; 2026 Sora Kai Art Studio. All rights reserved.</p>
    </footer>

</body>
</html>
