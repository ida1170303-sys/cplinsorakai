    <nav>

    <div class="container">
        <article>
            <h1>路上</h1>
            
            <div class="poem-content">
                <div class="poem-stanza">
                    大黃狗撲向兩隻覓食的鴿子<br>
                    牠們輕巧振翅飛走
                </div>

                <div class="poem-stanza">
                    轉身看牠<br>
                    興奮的嘴角仍帶著戲謔的笑
                </div>

                <div class="poem-stanza">
                    莞爾
                </div>

                <div class="poem-stanza moment">
                    那就是個當下
                </div>
            </div>
        </article>
    </div>
