    <div class="container">
        <article>
            <h1>雛菊</h1>
            
            <div class="poem-content">
                <div class="poem-stanza">
                    我以為 我是<br>
                    那善於等待的<br>
                    雛菊 
                </div>

                <div class="poem-stanza">
                    第一眼 就記起<br>
                    那是多少世的熟悉<br>
                    而漂泊的你<br>
                    總是 離去<br>
                    留我在長夜裡嘆息<br>
                    嚶嚶哭泣
                </div>

                <div class="poem-stanza">
                    我正是<br>
                    那善於等待的<br>
                    雛菊 
                </div>

                <div class="poem-stanza">
                    在你望見之前<br>
                    已經<br>
                    羞怯地開放 又<br>
                    靜默地凋萎
                </div>

                <div class="poem-stanza">
                    錯過了 我們<br>
                    又是千萬年
                </div>
            </div>
        </article>
