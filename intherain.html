<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微雨 | Writing | Sora Kai 的小宇宙</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            line-height: 2.5; /* 增加行高，讓詩句像雨滴般落下 */
            color: #5a6a7a;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }
        nav {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #eef2f5;
        }
        nav a {
            text-decoration: none;
            color: #b0bec5;
            font-size: 0.9em;
            transition: 0.3s;
        }
        nav a:hover {
            color: #546e7a;
        }
        .container {
            max-width: 600px;
            margin: 100px auto;
            padding: 0 40px;
        }
        header {
            text-align: center;
            margin-bottom: 80px;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 12px;
            color: #78909c;
            margin-left: 12px; /* 修正字距造成的偏移 */
        }
        .poem-content {
            font-size: 1.1em;
            letter-spacing: 3px;
            text-align: center;
        }
        .stanza {
            margin-bottom: 60px;
        }
        /* 呈現「褪色」與「空白」的視覺感 */
        .faded {
            color: #90a4ae;
            font-size: 0.95em;
        }
        .void {
            margin-top: 80px;
            color: #cfd8dc;
            font-weight: 300;
            letter-spacing: 5px;
        }
        footer {
            text-align: center;
            margin-top: 120px;
            padding-bottom: 40px;
            font-size: 0.8em;
            color: #cfd8dc;
        }
    </style>
</head>
<body>

    <nav>
        <a href="Writing.html">← 返回文字創作清單</a>
    </nav>

    <div class="container">
        <article>
            <header>
                <h1>微雨</h1>
            </header>
            
            <div class="poem-content">
                <div class="stanza faded">
                    淡綠 或是小王子般的多彩<br>
                    都已褪色
                </div>

                <div class="stanza">
                    佇足 微雨中<br>
                    細細回想
                </div>

                <div class="stanza">
                    最當初的心情不再<br>
                    未知的期待 熱切
                </div>

                <div class="stanza">
                    多年後 轉身
                </div>

                <div class="stanza void">
                    已是歸零與空白
                </div>
            </div>
        </article>
    </div>

    <footer>
        <p>&copy; 2026 Sora Kai Art Studio. All rights reserved.</p>
    </footer>

</body>
</html>
